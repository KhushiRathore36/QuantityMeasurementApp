server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      # 🔥 GLOBAL CORS FIX (IMPORTANT)
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:4200"
              - "https://*.vercel.app"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      # 🔥 ROUTES
      routes:

        # USER SERVICE AUTH
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/auth/**

        # OAUTH ROUTES
        - id: user-service-oauth
          uri: lb://user-service
          predicates:
            - Path=/oauth2/**, /login/oauth2/**

        # QUANTITY SERVICE
        - id: quantity-service
          uri: lb://quantity-service
          predicates:
            - Path=/api/v1/quantities/**

      # 🔥 IMPORTANT FIX FOR CORS HEADERS DUPLICATION
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

eureka:
  client:
    service-url:
      defaultZone: https://quantitymeasurementapp-production-56e9.up.railway.app/eureka/
    register-with-eureka: true
    fetch-registry: true